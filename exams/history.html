<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử làm bài — TOEIC Thầy Sang</title>
<meta name="description" content="Xem lại lịch sử và kết quả các bài thi TOEIC bạn đã làm.">
<link rel="stylesheet" href="../style.css">
<style>
/* ── Info banner ── */
.hist-info {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: .83rem;
  font-weight: 500;
  margin-bottom: 20px;
  border: 1px solid;
}
.hist-info.local {
  background: var(--warning-light);
  border-color: rgba(245,158,11,.3);
  color: #92400e;
}
.hist-info.cloud {
  background: var(--primary-light);
  border-color: rgba(29,111,242,.25);
  color: var(--primary-dark);
}

/* ── Empty state ── */
.history-empty {
  text-align: center;
  padding: 64px 16px;
  color: var(--text-3);
}
.history-empty-icon { font-size: 3rem; margin-bottom: 16px; }
.history-empty p { font-size: .95rem; margin-bottom: 20px; }

/* ── Cards ── */
.history-list { display: flex; flex-direction: column; gap: 12px; }

.history-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: var(--transition);
}
@media (hover: hover) {
  .history-card:hover { border-color: var(--primary); box-shadow: var(--shadow-blue); }
}

.history-score-ring {
  flex-shrink: 0;
  width: 58px; height: 58px;
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-weight: 800; font-size: .82rem; line-height: 1.2;
  border: 3px solid;
}
.history-score-ring.pass { border-color: var(--success); color: var(--success); background: var(--success-light); }
.history-score-ring.fail { border-color: var(--danger);  color: var(--danger);  background: var(--danger-light);  }
.ring-pct { font-size: .62rem; font-weight: 600; opacity: .75; }

.history-info { flex: 1; min-width: 0; }
.history-title {
  font-size: .95rem; font-weight: 700; color: var(--text);
  margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.history-meta {
  display: flex; flex-wrap: wrap; gap: 10px;
  font-size: .78rem; color: var(--text-3);
}
.history-meta span { display: flex; align-items: center; gap: 4px; }

.history-actions { flex-shrink: 0; }
.history-actions .btn { font-size: .82rem; padding: 8px 18px; }

@media (max-width: 540px) {
  .history-card { flex-wrap: wrap; }
  .history-actions { width: 100%; }
  .history-actions .btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<script src="../config.js"></script>
<script>const PATH_TO_ROOT = '../';</script>
<script src="../nav.js"></script>
<script type="module" src="../auth.js"></script>

<div class="page-body">
  <div class="container">

    <div class="page-header" style="border-radius:var(--radius);margin-bottom:24px">
      <div class="page-header-badge">📊 Kết quả của bạn</div>
      <h1>Lịch sử làm bài</h1>
      <p>Các bài thi bạn đã hoàn thành.</p>
    </div>

    <div id="historyContainer">
      <p style="color:var(--text-3);text-align:center;padding:40px 0">Đang tải...</p>
    </div>

  </div>
</div>

<script type="module">
/* Chạy sau auth.js vì cùng là module, khai báo sau trong DOM */
const { user, whitelisted } = await window._ttsAuthReady;

const container = document.getElementById('historyContainer');

/* ── Helpers ── */
function formatDate(d) {
  if (!d) return '';
  return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function formatElapsed(ms) {
  if (!ms) return '';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return h + 'g ' + (m % 60) + 'p';
  return m + ' phút ' + (s % 60) + 'g';
}

function renderCards(entries) {
  if (!entries.length) {
    container.innerHTML += `
      <div class="history-empty">
        <div class="history-empty-icon">📋</div>
        <p>Bạn chưa hoàn thành bài thi nào.<br>Hãy vào luyện đề và nộp bài để xem kết quả tại đây.</p>
        <a href="index.html" class="btn btn-primary">Vào luyện đề</a>
      </div>`;
    return;
  }

  const cards = entries.map(e => {
    const pct     = e.pct ?? (e.totalQ ? Math.round(e.totalCorrect / e.totalQ * 100) : 0);
    const isPassed = pct >= 50;
    const dateStr  = e.date ? formatDate(e.date) : '';
    const timeStr  = e.elapsed ? formatElapsed(e.elapsed) : '';
    const countStr = e.count > 1 ? `${e.count} lần làm` : '1 lần làm';

    return `
      <div class="history-card">
        <div class="history-score-ring ${isPassed ? 'pass' : 'fail'}">
          <span>${e.totalCorrect}/${e.totalQ}</span>
          <span class="ring-pct">${pct}%</span>
        </div>
        <div class="history-info">
          <div class="history-title">${e.examTitle || e.examId || 'Bài thi'}</div>
          <div class="history-meta">
            ${dateStr ? `<span>📅 ${dateStr}</span>` : ''}
            ${timeStr ? `<span>⏱ ${timeStr}</span>` : ''}
            <span>🔄 ${countStr}</span>
          </div>
        </div>
        <div class="history-actions">
          <a href="${e.examUrl || '#'}" class="btn btn-outline">Làm lại</a>
        </div>
      </div>`;
  }).join('');

  container.innerHTML += `<div class="history-list">${cards}</div>`;
}

/* ══ NHÁNH 1: Học viên → đọc Firestore ══ */
if (whitelisted && user) {
  container.innerHTML = `
    <div class="hist-info cloud">
      ☁️ Lịch sử của bạn lưu vĩnh viễn trên tài khoản — truy cập được từ bất kỳ thiết bị nào.
    </div>`;

  try {
    const { collection, query, where, getDocs } =
      await import('https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js');

    const db   = window._ttsDb;
    const snap = await getDocs(
      query(collection(db, 'results'), where('uid', '==', user.uid))
    );

    /* Gộp theo examId, lấy lần gần nhất */
    const byExam = {};
    snap.docs.forEach(d => {
      const data = d.data();
      const eid  = data.examId;
      const ts   = data.createdAt?.toMillis?.() ?? 0;
      if (!byExam[eid] || ts > byExam[eid]._ts) {
        byExam[eid] = { ...data, _ts: ts, count: 1 };
      } else {
        byExam[eid].count = (byExam[eid].count || 1) + 1;
      }
    });

    /* Đếm đủ số lần */
    const counts = {};
    snap.docs.forEach(d => {
      const eid = d.data().examId;
      counts[eid] = (counts[eid] || 0) + 1;
    });

    const entries = Object.values(byExam)
      .map(e => ({
        examId:       e.examId,
        examTitle:    e.examTitle,
        totalCorrect: e.totalCorrect,
        totalQ:       e.totalQ,
        pct:          e.pct,
        elapsed:      e.elapsed,
        date:         e.createdAt?.toDate?.() ?? null,
        examUrl:      e.examUrl || '',
        count:        counts[e.examId] || 1,
      }))
      .sort((a, b) => (b.date?.getTime() ?? 0) - (a.date?.getTime() ?? 0));

    renderCards(entries);
  } catch(err) {
    console.error('Firestore history error:', err);
    container.innerHTML += `<p style="color:var(--danger);text-align:center;padding:20px 0">Không tải được lịch sử. Vui lòng thử lại.</p>`;
  }

/* ══ NHÁNH 2: Chưa đăng nhập hoặc không phải học viên → localStorage ══ */
} else {
  container.innerHTML = `
    <div class="hist-info local">
      ⚠️ Lịch sử lưu cùng dữ liệu trình duyệt — xoá cache hoặc dùng thiết bị khác sẽ mất.
      ${!user ? ' Đăng nhập và đăng ký khoá học để lưu vĩnh viễn.' : ''}
    </div>`;

  const entries = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key?.startsWith('hist_')) continue;
    try {
      const list = JSON.parse(localStorage.getItem(key) || '[]');
      if (!list.length) continue;
      const latest = list[0];
      entries.push({
        examId:       latest.examId,
        examTitle:    latest.examTitle,
        totalCorrect: latest.totalCorrect,
        totalQ:       latest.totalQ,
        pct:          latest.totalQ ? Math.round(latest.totalCorrect / latest.totalQ * 100) : 0,
        elapsed:      latest.elapsed,
        date:         latest.savedAt ? new Date(latest.savedAt) : null,
        examUrl:      latest.examUrl || '',
        count:        list.length,
      });
    } catch(e) {}
  }
  entries.sort((a, b) => (b.date?.getTime() ?? 0) - (a.date?.getTime() ?? 0));
  renderCards(entries);
}
</script>

</body>
</html>
