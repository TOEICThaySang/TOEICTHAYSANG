<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện đề TOEIC ETS — TOEIC Thầy Sang</title>
<meta name="description" content="Luyện đề TOEIC ETS 2023 & 2024 chuẩn format 200 câu, có giải thích chi tiết từng câu cùng Thầy Sang.">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="exams.css">
</head>
<body>
<script src="../config.js"></script>
<script>const PATH_TO_ROOT = '../';</script>
<script src="../nav.js"></script>
<script type="module" src="../auth.js"></script>

<div class="page-body">
  <div class="container">

    <!-- Đề thi thử miễn phí -->
    <div class="free-box">
      <div class="free-box-badge"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>Học thử miễn phí</div>
      <div id="gridThiThu"><p class="exam-loading">Đang tải...</p></div>
    </div>

    <div class="section-divider"><span>Đề thi dành cho học viên</span></div>

    <!-- Series tabs -->
    <div class="series-tabs" role="tablist" aria-label="Chọn bộ đề">
      <div class="series-tab ets2023 active" id="stTab2023"
           role="tab" aria-selected="true" tabindex="0" aria-controls="panel2023"
           onclick="switchYear('2023')">
        <div class="st-name">ETS 2023</div>
        <div class="st-sub">10 bài test · 200 câu · 120 phút</div>
      </div>
      <div class="series-tab ets2024" id="stTab2024"
           role="tab" aria-selected="false" tabindex="-1" aria-controls="panel2024"
           onclick="switchYear('2024')">
        <div class="st-name">ETS 2024</div>
        <div class="st-sub">10 bài test · 200 câu · 120 phút</div>
      </div>
    </div>

    <!-- Exam panels -->
    <div class="exam-panel panel-in" id="panel2023" role="tabpanel" aria-labelledby="stTab2023">
      <div class="exam-grid" id="grid2023">
        <p class="exam-loading">Đang tải...</p>
      </div>
    </div>
    <div class="exam-panel" id="panel2024" role="tabpanel" aria-labelledby="stTab2024" hidden>
      <div class="exam-grid" id="grid2024">
        <p class="exam-loading">Đang tải...</p>
      </div>
    </div>

    <!-- Upgrade banner — chỉ hiện nếu chưa mua -->
    <div class="upgrade-banner" id="upgradeBanner" style="display:none">
      <div class="ub-left">
        <div class="ub-title"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Mở khoá 20 đề ETS 2023 &amp; 2024</div>
        <div class="ub-sub">Học viên Thầy Sang · Truy cập không giới hạn</div>
      </div>
      <button class="ub-btn" onclick="window.open('https://www.facebook.com/toeicthaysangonline','_blank')">Đăng ký ngay</button>
    </div>

  </div>
</div>

<script>
const _ic = (sz,st,inner) => `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="${st}">${inner}</svg>`;
const IX = {
  clipboard: _ic(13,'vertical-align:-1px;margin-right:4px','<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>'),
  trophy:    _ic(13,'vertical-align:-1px;margin-right:4px','<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>'),
  hourglass: _ic(13,'vertical-align:-1px;margin-right:4px','<path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>'),
};

function renderFreeGrid(container, data, prefix) {
  if (!data.length) { container.innerHTML = ''; return; }
  container.innerHTML = data.map(exam => {
    if (!exam.file) return '';
    const histKey = 'hist_' + prefix + '_de' + exam.id;
    const history = JSON.parse(localStorage.getItem(histKey) || '[]');
    const best    = history.length
      ? Math.max(...history.map(h => h.totalQ > 0 ? Math.round(h.totalCorrect / h.totalQ * 100) : 0))
      : null;
    return `
      <div class="free-card" onclick="location.href='${prefix}/${exam.file}'"
           role="button" tabindex="0" aria-label="${exam.title}">
        <div class="free-card-num">${String(exam.id).padStart(2,'0')}</div>
        <div class="free-card-body">
          <div class="free-card-title">${exam.title}</div>
          <div class="free-card-meta">${IX.clipboard}${exam.meta}${best !== null ? ` &nbsp;·&nbsp; ${IX.trophy}Tốt nhất: ${best}%` : ''}</div>
        </div>
        <button class="free-card-btn">Làm đề →</button>
      </div>`;
  }).join('');
  container.querySelectorAll('.free-card').forEach(card => {
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
    });
  });
}

function renderGrid(grid, data, prefix, yearCls) {
  grid.innerHTML = data.map((exam, i) => {
    const histKey = 'hist_' + prefix + '_de' + exam.id;
    const history = JSON.parse(localStorage.getItem(histKey) || '[]');
    const best    = history.length
      ? Math.max(...history.map(h => h.totalQ > 0 ? Math.round(h.totalCorrect / h.totalQ * 100) : 0))
      : null;

    let onclick, badgeHTML;
    if (exam.file) {
      onclick   = `location.href='${prefix}/${exam.file}'`;
      badgeHTML = `<span class="exam-card-btn free">Làm đề →</span>`;
    } else {
      onclick   = `showToast('Đề đang được chuẩn bị...')`;
      badgeHTML = `<span class="exam-card-btn coming-soon">${IX.hourglass}Sắp ra</span>`;
    }

    return `
      <div class="exam-card ${yearCls} anim"
           style="animation-delay:${i * .04}s"
           onclick="${onclick}"
           role="button"
           tabindex="0"
           aria-label="${exam.title}">
        <div class="exam-card-num">${String(exam.id).padStart(2, '0')}</div>
        <div class="exam-card-title">${exam.title}</div>
        <div class="exam-card-meta">${IX.clipboard}${exam.meta}</div>
        ${best !== null ? `<div class="exam-card-best">${IX.trophy}Tốt nhất: ${best}%</div>` : ''}
        <div class="exam-card-footer">${badgeHTML}</div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.exam-card').forEach(card => {
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
    });
  });
}

function loadFreeSection(containerId, url, prefix) {
  const container = document.getElementById(containerId);
  fetch(url)
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => renderFreeGrid(container, data, prefix))
    .catch(() => {
      container.innerHTML = `<p style="color:var(--danger);padding:12px 0">Không tải được đề thi thử.</p>`;
    });
}

function loadSection(gridId, url, prefix, yearCls) {
  const grid = document.getElementById(gridId);
  fetch(url)
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => renderGrid(grid, data, prefix, yearCls))
    .catch(() => {
      grid.innerHTML = `<p style="color:var(--danger);grid-column:1/-1;padding:20px 0">Không tải được danh sách đề thi. Vui lòng thử lại.</p>`;
    });
}

function switchYear(year) {
  document.querySelectorAll('.series-tab').forEach(c => {
    const on = c.id === 'stTab' + year;
    c.classList.toggle('active', on);
    c.setAttribute('aria-selected', on);
    c.setAttribute('tabindex', on ? '0' : '-1');
  });
  ['2024', '2023'].forEach(y => {
    const panel = document.getElementById('panel' + y);
    if (y === year) {
      panel.hidden = false;
      panel.classList.remove('panel-in');
      void panel.offsetWidth;
      panel.classList.add('panel-in');
    } else {
      panel.hidden = true;
    }
  });
}

document.querySelectorAll('.series-tab').forEach(tab => {
  tab.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); tab.click(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      const other = tab.id === 'stTab2024' ? 'stTab2023' : 'stTab2024';
      const otherEl = document.getElementById(other);
      otherEl.focus(); otherEl.click();
    }
  });
});

loadFreeSection('gridThiThu', 'thi-thu/lessons.json', 'thi-thu');
loadSection('grid2023', 'ets2023/lessons.json', 'ets2023', 'ets2023');
loadSection('grid2024', 'ets2024/lessons.json', 'ets2024', 'ets2024');

/* Upgrade banner: hiện nếu chưa mua */
window._ttsAuthReady?.then(({ whitelisted }) => {
  const b = document.getElementById('upgradeBanner');
  if (b && !whitelisted) b.style.display = '';
});
</script>
<script type="module">
import { collection, query, where, getDocs }
  from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js';

const _icM = (sz,st,inner) => `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="${st}">${inner}</svg>`;
const IM = {
  calendar: _icM(13,'vertical-align:-1px;margin-right:4px','<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'),
  clock:    _icM(13,'vertical-align:-1px;margin-right:4px','<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'),
  xClose:   `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};

async function showGlobalHistory(user) {
  if (!user) {
    window.showToast('Vui lòng đăng nhập để xem lịch sử.', 'error');
    return;
  }
  const overlay = document.createElement('div');
  overlay.className = 'gh-overlay';
  overlay.innerHTML = `
    <div class="gh-modal">
      <div class="gh-header">
        <div class="gh-title">${IM.barChart}Lịch sử làm đề</div>
        <button class="gh-close" aria-label="Đóng">${IM.xClose}</button>
      </div>
      <div class="gh-body" id="ghBody">
        <div class="gh-placeholder">Đang tải...</div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.gh-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  const body = document.getElementById('ghBody');
  try {
    const snap = await getDocs(query(collection(window._ttsDb,'results'), where('uid','==',user.uid)));
    const records = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => {
        const ta = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : (a.savedAt||0);
        const tb = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : (b.savedAt||0);
        return tb - ta;
      });

    if (!records.length) {
      body.innerHTML = '<div class="gh-placeholder">Chưa có lịch sử làm bài.</div>';
      return;
    }
    body.innerHTML = '';
    records.forEach(r => {
      const ts   = r.createdAt?.toDate ? r.createdAt.toDate() : new Date(r.savedAt||0);
      const date = ts.toLocaleDateString('vi-VN');
      const time = ts.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
      const pct  = r.totalQ>0 ? Math.round(r.totalCorrect/r.totalQ*100) : 0;
      const sc   = pct>=70?'good':pct>=40?'mid':'low';
      const row  = document.createElement('div');
      row.className = 'gh-row';
      row.innerHTML = `
        <div class="gh-row-info">
          <div class="gh-row-title">${r.examTitle||r.examId}</div>
          <div class="gh-row-meta">
            <span class="gh-badge ${r.mode==='practice'?'practice':'test'}">${r.mode==='practice'?'Luyện tập':'Thi thử'}</span>
            <span>${IM.calendar}${date}</span>
            <span>${IM.clock}${time}</span>
            <span>Part ${(r.selectedParts||[]).join(', ')}</span>
          </div>
        </div>
        <div class="gh-score ${sc}">${r.totalCorrect}/${r.totalQ}<br><small>${pct}%</small></div>
        ${r.answers&&r.examUrl
          ? `<button class="gh-btn-review">Xem lại</button>`
          : `<div class="gh-no-review">—</div>`}`;
      if (r.answers && r.examUrl) {
        row.querySelector('.gh-btn-review').addEventListener('click', () => {
          overlay.remove();
          const url = new URL(r.examUrl, location.href);
          url.searchParams.set('reviewDoc', r.id);
          window.location.href = url.toString();
        });
      }
      body.appendChild(row);
    });
  } catch(e) {
    console.error(e);
    body.innerHTML = '<div class="gh-placeholder" style="color:#dc2626">Lỗi tải dữ liệu.</div>';
  }
}
</script>
<script>
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s';
    document.body.appendChild(t);
  }
  t.innerHTML = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}
</script>
</body>
</html>
